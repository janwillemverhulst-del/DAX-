name: DAX MACD Signal

on:
  schedule:
    # Täglich um 18:30 Uhr (nach Xetra-Schluss 17:30 + Puffer)
    - cron: '30 16 * * 1-5'   # UTC = 18:30 Zürich Sommerzeit
  workflow_dispatch:           # Auch manuell startbar per Knopfdruck

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - name: Code holen
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bibliotheken installieren
        run: pip install yfinance pandas

      - name: Signal berechnen und senden
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python macd_signal.py
